<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Elios Boarding Pass</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    text-align: center;
}

/* BIGLIETTO */
.ticket {
    margin: 50px auto;
    width: 820px;
    background: white;
    border-radius: 25px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

/* LEFT */
.left {
    width: 70%;
    padding: 30px;
}

/* RIGHT */
.right {
    width: 30%;
    background: #f1f5f9;
    padding: 20px;
    border-left: 2px dashed #ccc;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
}

/* ROUTE */
.route {
    font-size: 55px;
    font-weight: bold;
    margin: 20px 0;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
}

.label {
    font-size: 11px;
    color: gray;
}

.value {
    font-weight: bold;
    font-size: 16px;
}

.footer {
    margin-top: 20px;
    border-top: 2px dashed #ccc;
    padding-top: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="ticket">

<div class="left">

<div class="header">
<div><b>ELIOS AIRLINES</b></div>
<div id="pnr"></div>
</div>

<div id="name"></div>

<div class="route" id="route"></div>

<div class="grid">

<div><div class="label">DATE</div><div class="value" id="date_out"></div></div>
<div><div class="label">FLIGHT</div><div class="value">EL<span id="flight"></span></div></div>
<div><div class="label">CLASS</div><div class="value">ECONOMY</div></div>

<div><div class="label">DEPARTURE</div><div class="value" id="departure"></div></div>
<div><div class="label">BOARDING</div><div class="value" id="boarding"></div></div>
<div><div class="label">GATE</div><div class="value" id="gate"></div></div>

<div><div class="label">TERMINAL</div><div class="value" id="terminal"></div></div>
<div><div class="label">SEAT</div><div class="value" id="seat"></div></div>
<div><div class="label">GROUP</div><div class="value">B</div></div>

</div>

<div class="footer">
Elios Airlines Boarding Pass
</div>

</div>

<div class="right">
<div id="qr"></div>
</div>

</div>

<script>

function rand(min,max){return Math.floor(Math.random()*(max-min)+min);}
function pnr(){return Math.random().toString(36).substring(2,8).toUpperCase();}
function seat(){let l=["A","B","C","D","E","F"];return rand(1,30)+l[rand(0,6)];}

// DATI
const p=new URLSearchParams(window.location.search);

let nome=p.get("nome") || "";
let cognome=p.get("cognome") || "";
let from=p.get("from") || "";
let to=p.get("to") || "";
let date=p.get("date") || "";

// FORMATO NOME AIRLINE
let fullName=(cognome+"/"+nome).toUpperCase();

// ORARI REALISTICI
let depHour=rand(6,22);
let depMin=rand(0,59);
let boardingMin=depMin-30;
if(boardingMin<0){boardingMin+=60; depHour--;}

let departure=depHour+":"+String(depMin).padStart(2,"0");
let boarding=depHour+":"+String(boardingMin).padStart(2,"0");

// OUTPUT
document.getElementById("name").innerText=fullName;
document.getElementById("route").innerText=
from.substring(0,3).toUpperCase()+" → "+to.substring(0,3).toUpperCase();

document.getElementById("date_out").innerText=date;
document.getElementById("pnr").innerText="PNR: "+pnr();

document.getElementById("gate").innerText="A"+rand(1,30);
document.getElementById("terminal").innerText=rand(1,3);
document.getElementById("seat").innerText=seat();
document.getElementById("flight").innerText=rand(100,999);

document.getElementById("departure").innerText=departure;
document.getElementById("boarding").innerText=boarding;

// QR
new QRCode(document.getElementById("qr"),{
text:fullName+" "+departure,
width:170,
height:170
});

</script>

</body>
</html>
