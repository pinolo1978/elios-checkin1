<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Elios Boarding Pass</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
.ticket {
    display:none;
    margin:50px auto;
    width:750px;
    background:white;
    color:black;
    border-radius:20px;
    overflow:hidden;
}
.header {
    background:linear-gradient(90deg,#0a1f44,#1c3f8c);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
}
.main {
    display:flex;
}
.left {
    width:65%;
    padding:25px;
    text-align:left;
}
.route {
    font-size:42px;
    font-weight:bold;
}
.right {
    width:35%;
    background:#f1f5f9;
    padding:20px;
}
.footer {
    border-top:2px dashed #ccc;
    padding:10px;
}
.loader {
    margin-top:150px;
}
</style>
</head>

<body>

<div class="loader" id="loader">
<h2>✈️ Generazione biglietto...</h2>
</div>

<div class="ticket" id="ticket">

<div class="header">
<b>ELIOS AIRLINES</b>
<div id="pnr"></div>
</div>

<div class="main">

<div class="left">
<div id="name"></div>
<div class="route" id="route"></div>
<div id="date_out"></div>

<br>

<div>Gate: <span id="gate"></span></div>
<div>Seat: <span id="seat"></span></div>
<div>Terminal: <span id="terminal"></span></div>
</div>

<div class="right">
<div id="qr"></div>
</div>

</div>

<div class="footer">
Elios Airlines Boarding Pass
</div>

</div>

<script>
function r(min,max){return Math.floor(Math.random()*(max-min)+min);}
function pnr(){return Math.random().toString(36).substring(2,8).toUpperCase();}
const p=new URLSearchParams(window.location.search);
let n=p.get("nome"),c=p.get("cognome"),f=p.get("from"),t=p.get("to"),d=p.get("date");

setTimeout(()=>{
loader.style.display="none";
ticket.style.display="block";

name.innerText=n+" "+c;
route.innerText=f.substring(0,3).toUpperCase()+" → "+t.substring(0,3).toUpperCase();
date_out.innerText=d;
pnr.innerText="PNR: "+pnr();

gate.innerText="A"+r(1,30);
seat.innerText=r(1,30)+"A";
terminal.innerText=r(1,3);

new QRCode(document.getElementById("qr"),{
text:n+" "+c,
width:130,
height:130
});
},1500);
</script>

</body>
</html>
